# Self-host path for the control-plane bot: `docker compose up` from this directory is the
# complete deploy. Also the reference for the shared/hosted bot — same file either way.
#
# Two services: `bot` (the daemon-facing relay + Discord gateway) and `caddy` (reverse proxy
# in front of it, terminating automatic TLS for the hostname in .env). Copy .env.example to
# .env alongside this file and fill in DISCORD_BOT_TOKEN + RELAY_HOSTNAME before starting.

services:
  bot:
    build:
      context: ..
      dockerfile: packages/control-plane-bot/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # bindings.json (the only state this bot persists) lives on the named volume below, not
      # in the image, so a redeploy/restart never loses a pairing.
      CCTL_BOT_STATE_DIR: /data/bot-state
      CCTL_RELAY_PORT: '8765'
    volumes:
      - bot-state:/data/bot-state
    # Not published to the host directly — caddy is the only public entry point.
    expose:
      - '8765'
    # Containment backstop for the shared, internet-reachable relay process: a resource-
    # exhaustion attempt (a flood of oversized frames or unauthenticated handshakes) can at worst
    # crash-and-restart this one container instead of starving the host and taking caddy with it.
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    # The bot listens on 8765 (a high port) and needs no Linux capabilities at all.
    cap_drop:
      - ALL

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - bot
    # Least privilege: caddy needs only the hostname (to request its cert and vhost) — never the
    # Discord bot token. Compose interpolates ${RELAY_HOSTNAME} from the same .env at parse time,
    # so exactly one value reaches this internet-facing container instead of the whole secret file.
    environment:
      RELAY_HOSTNAME: ${RELAY_HOSTNAME}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    mem_limit: 256m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true

volumes:
  # Backup story for this round: copy the volume. No DB migration, no external store.
  bot-state:
  # Caddy's ACME account + issued certs — losing this just costs a re-issue, not an outage.
  caddy-data:
  caddy-config:
